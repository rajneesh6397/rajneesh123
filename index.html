<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Attendance Portal</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #28a745;
            --dark: #333;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: #e9ecef;
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        /* Dashboard Styles */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card h3 { margin: 0; color: #666; font-size: 0.9rem; text-transform: uppercase; }
        .card p { margin: 10px 0 0; font-size: 1.8rem; font-weight: bold; color: var(--primary); }

        /* Main UI */
        .main-box {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--light);
            padding-bottom: 15px;
        }

        .input-section {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        button {
            padding: 12px 25px;
            background: var(--success);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { opacity: 0.9; }

        /* Table Design */
        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--light);
            text-align: left;
            padding: 15px;
            color: #555;
            font-size: 0.85rem;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #eee;
            font-size: 0.95rem;
        }

        .badge-day { background: #fff3cd; color: #856404; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; }
        .badge-month { background: #d1ecf1; color: #0c5460; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Attendance Dashboard</h1>
        <div id="current-date" style="color: #666;"></div>
    </div>

    <div class="dashboard">
        <div class="card">
            <h3>Total Present</h3>
            <p id="count-total">0</p>
        </div>
        <div class="card">
            <h3>Today's Count</h3>
            <p id="count-today">0</p>
        </div>
        <div class="card">
            <h3>Current Month</h3>
            <p id="current-month-name">-</p>
        </div>
    </div>

    <div class="main-box">
        <div class="input-section">
            <input type="text" id="studentName" placeholder="Enter Student Name...">
            <button onclick="addAttendance()">Mark Attendance</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Student Name</th>
                    <th>Date</th>
                    <th>Day</th>
                    <th>Month</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody id="attendanceBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let totalCount = 0;
    let todayCount = 0;

    // Display Current Month in Dashboard
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const days = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
    
    document.getElementById('current-month-name').innerText = months[new Date().getMonth()];
    document.getElementById('current-date').innerText = new Date().toDateString();

    function addAttendance() {
        const nameInput = document.getElementById('studentName');
        const name = nameInput.value.trim();
        
        if (name === "") {
            alert("Please enter a name");
            return;
        }

        const now = new Date();
        
        // Date details
        const dateNum = now.getDate();
        const monthName = months[now.getMonth()];
        const dayName = days[now.getDay()];
        const timeStr = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const fullDate = `${dateNum} ${monthName.substring(0,3)} ${now.getFullYear()}`;

        // Create Table Row
        const tbody = document.getElementById('attendanceBody');
        const row = document.createElement('tr');

        row.innerHTML = `
            <td><strong>${name}</strong></td>
            <td>${fullDate}</td>
            <td><span class="badge-day">${dayName}</span></td>
            <td><span class="badge-month">${monthName}</span></td>
            <td>${timeStr}</td>
        `;

        tbody.prepend(row);

        // Update Dashboard
        totalCount++;
        todayCount++; // In a real app, this would reset every 24h
        document.getElementById('count-total').innerText = totalCount;
        document.getElementById('count-today').innerText = todayCount;

        // Clear input
        nameInput.value = "";
        nameInput.focus();
    }

    // Enter Key Trigger
    document.getElementById('studentName').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') addAttendance();
    });
</script>

</body>
</html>
